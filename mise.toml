[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.dev]
description = "Start development server"
run = "bunx --bun astro dev"

[tasks.build]
description = "Build the project"
run = "bunx --bun astro build"

[tasks.preview]
description = "Preview the production build"
run = "bunx --bun astro preview"

[tasks.deploy-main]
description = "Deploy main site"
depends = ["build"]
run = "wrangler deploy"

[tasks.deploy-email]
description = "Deploy email worker"
run = "cd workers/email && wrangler deploy --config wrangler.jsonc"

[tasks.deploy]
description = "Deploy both workers"
depends = ["deploy-main", "deploy-email"]
run = "echo '✅ Both workers deployed!'"
