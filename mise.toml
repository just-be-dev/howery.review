[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.dev]
description = "Start development server"
run = "astro dev"

[tasks.build]
description = "Build the project"
run = "astro build"

[tasks.preview]
description = "Preview the production build"
run = "astro preview"

[tasks."deploy:main"]
description = "Deploy main site"
depends = ["build"]
run = "wrangler deploy"

[tasks."deploy:email"]
description = "Deploy email worker"
dir = "workers/email"
run = "wrangler deploy --config wrangler.jsonc"

[tasks.deploy]
description = "Deploy both workers"
depends = ["deploy:main", "deploy:email"]
