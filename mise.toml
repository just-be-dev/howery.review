[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.dev]
description = "Start development server"
run = "astro dev"

[tasks.build]
description = "Build the project"
run = "astro build"

[tasks.preview]
description = "Preview the production build"
run = "astro preview"

[tasks.deploy]
description = "Deploy to Cloudflare"
depends = ["build"]
run = "wrangler deploy"
